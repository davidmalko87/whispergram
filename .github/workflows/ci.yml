name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        # faster-whisper is intentionally NOT installed here. The merge/mapping logic is
        # pure and tested offline; the transcription dependency is only needed at runtime
        # by end users. Skipping it keeps CI fast and proves the module imports without it.
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Verify the module imports without transcription deps
        run: |
          python -c "import whispergram; print('version:', whispergram.__version__)"
          python -c "from whispergram import build_transcript, extract_text, media_marker"

      - name: Run tests
        run: pytest -q

      - name: Dry-run smoke test on the sample fixture
        run: |
          python whispergram.py --dry-run tests/fixtures/sample_export --out /tmp/merged.md
          cat /tmp/merged.md

      - name: Verify CLI help loads
        run: python whispergram.py --help
